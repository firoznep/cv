# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - mgc-qatar

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: https://firoznep.github.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_AEB1B60CF4BD4CCFB0630A33482A9EF8 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_73B7FEEC1E8746B48A10A914F996C4D2 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: firoznep.github.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_AEB1B60CF4BD4CCFB0630A33482A9EF8 }}/appsvc/staticsite:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_956F1977B0144B10A7F7650A1539A6FB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8E272067635E42898E40D62B12457DE9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_593A70744AA04BAC89B3BECC53579D39 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'mgc-qatar'
          slot-name: 'Production'
          images: 'firoznep.github.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_AEB1B60CF4BD4CCFB0630A33482A9EF8 }}/appsvc/staticsite:${{ github.sha }}'
          